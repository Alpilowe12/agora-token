name: تحديث توكن أجورا تلقائياً

on:
  schedule:
    # كل 20 ساعة (بهامش أمان قبل انتهاء صلاحية التوكن الحالي بـ 24 ساعة)
    - cron: '0 */20 * * *'
  workflow_dispatch: # يسمح بتشغيل الوركفلو يدوياً من تبويب Actions وقت ما تحب

permissions:
  contents: write

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل المستودع
        uses: actions/checkout@v4

      - name: تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت مكتبة توليد التوكن
        run: npm install agora-token

      - name: توليد توكن جديد
        run: node generate-token.js
        env:
          AGORA_APP_ID: ${{ secrets.AGORA_APP_ID }}
          AGORA_APP_CERTIFICATE: ${{ secrets.AGORA_APP_CERTIFICATE }}

      - name: حفظ التوكن الجديد في المستودع
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add token.json
          git diff --staged --quiet || git commit -m "تحديث توكن أجورا التلقائي"
          git push
